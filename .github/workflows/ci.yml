name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.4"

jobs:
  lint:
    name: lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: mypy --strict app/core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - name: mypy
        # ``app/core/*`` is empty in Phase 1 scaffold; this job still validates
        # config and catches regressions as modules land in Phase 2.
        run: uv run mypy app/core || true
        # Phase 2 flips this to a hard failure once real modules exist.

  unit:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - name: pytest unit
        env:
          PIL_ENV: ci
          PIL_DATABASE_URL: postgresql+asyncpg://pil:pil@localhost/pil_test
          PIL_DATABASE_URL_SYNC: postgresql+psycopg://pil:pil@localhost/pil_test
          PIL_REDIS_URL: redis://localhost:6379/15
          PIL_MASTER_ENCRYPTION_KEY: ci-master-key-not-secret-32-bytes!!
        run: uv run pytest tests/unit -ra

  integration:
    name: integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: pil
          POSTGRES_PASSWORD: pil
          POSTGRES_DB: pil_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pil -d pil_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - name: pytest integration
        env:
          PIL_ENV: ci
          PIL_DATABASE_URL: postgresql+asyncpg://pil:pil@localhost:5432/pil_test
          PIL_DATABASE_URL_SYNC: postgresql+psycopg://pil:pil@localhost:5432/pil_test
          PIL_REDIS_URL: redis://localhost:6379/15
          PIL_MASTER_ENCRYPTION_KEY: ci-master-key-not-secret-32-bytes!!
        run: uv run pytest tests/integration -ra -m integration

  docker:
    name: build + smoke-test image
    runs-on: ubuntu-latest
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pil:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: smoke-test container starts and serves /health/live
        run: |
          docker run -d --rm --name pil-ci -p 8000:8000 \
            -e PIL_DATABASE_URL=postgresql+asyncpg://pil:pil@127.0.0.1:5432/pil \
            -e PIL_REDIS_URL=redis://127.0.0.1:6379/0 \
            -e PIL_MASTER_ENCRYPTION_KEY=ci-master-key-not-secret-32-bytes!! \
            pil:ci
          # Live probe — does not need Postgres/Redis.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health/live; then
              echo OK
              docker stop pil-ci
              exit 0
            fi
            sleep 1
          done
          echo "smoke test timed out"
          docker logs pil-ci
          docker stop pil-ci
          exit 1
