# OpenTelemetry Collector config for local dev.
# Receives OTLP from the PIL app, forwards traces to Jaeger, exposes a
# Prometheus scrape endpoint on :8889 for metrics.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Defensive: strip any attribute that looks like raw prompt content before
  # it leaves the collector. Keeps the PII-leakage invariant honest at the
  # edge even if app-side scrubbing has a bug.
  attributes/strip_payloads:
    actions:
      - key: gen_ai.prompt
        action: delete
      - key: gen_ai.completion
        action: delete
      - key: http.request.body
        action: delete
      - key: http.response.body
        action: delete

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: pil
    send_timestamps: true

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [attributes/strip_payloads, batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [attributes/strip_payloads, batch]
      exporters: [debug]
